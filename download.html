<!DOCTYPE html>
<html>
<head>
  <title>Download</title>
</head>

<body style="font-family: Arial; text-align:center; padding:60px;">

  <h2>Payment Successful 🎉</h2>

  <a id="download-link"
     href="#"
     style="padding:15px 30px; background:green; color:white; text-decoration:none;"
     aria-disabled="true">
     Download PDF
  </a>

  <p id="status">Verifying payment...</p>

  <script>
  async function unlockDownload() {

    const params = new URLSearchParams(window.location.search);

    const paymentId = params.get('payment_id');
    const orderId = params.get('order_id');
    const signature = params.get('signature');

    const btn = document.getElementById("download-link");
    const status = document.getElementById("status");

    // ❌ No params = block
    if (!paymentId || !orderId || !signature) {
      status.innerText = "Invalid access. Please complete payment.";
      return;
    }

    try {

      const res = await fetch("https://payment-worker.kpshakkir7.workers.dev/verify-payment", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          razorpay_payment_id: paymentId,
          razorpay_order_id: orderId,
          razorpay_signature: signature
        })
      });

      const result = await res.json();

      if (!result.success) throw new Error();

      // ✅ Enable secure download
      btn.href = "https://payment-worker.kpshakkir7.workers.dev/download?paid=true";
      btn.removeAttribute("aria-disabled");

      status.innerText = "Download ready. Click below.";

    } catch (err) {
      status.innerText = "Payment verification failed.";
    }
  }

  unlockDownload();
  </script>

</body>
</html>
